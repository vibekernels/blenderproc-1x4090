<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Beer Pong Detector</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    color: #eee;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    overflow: hidden;
    height: 100dvh;
    display: flex;
    flex-direction: column;
  }
  #header {
    padding: 8px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #16213e;
    z-index: 10;
  }
  #header h1 { font-size: 16px; font-weight: 600; }
  #stats { font-size: 13px; opacity: 0.7; }
  #camera-select {
    font-size: 13px;
    background: #0f3460;
    color: #eee;
    border: none;
    padding: 4px 8px;
    border-radius: 4px;
  }
  #container {
    flex: 1;
    position: relative;
    overflow: hidden;
  }
  #video {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: cover;
  }
  #canvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 5;
  }
  #overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 20;
    background: rgba(0,0,0,0.7);
  }
  #overlay.hidden { display: none; }
  #overlay-content { text-align: center; padding: 24px; }
  #overlay-content p { margin: 8px 0; font-size: 14px; }
  .spinner {
    width: 40px; height: 40px;
    border: 4px solid rgba(255,255,255,0.2);
    border-top-color: #e94560;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
#conf-slider {
    position: absolute;
    bottom: 12px; left: 16px; right: 16px;
    z-index: 10;
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(22,33,62,0.85);
    padding: 8px 12px;
    border-radius: 8px;
  }
  #conf-slider label { font-size: 12px; white-space: nowrap; }
  #conf-slider input[type=range] { flex: 1; }
  #conf-val { font-size: 12px; min-width: 36px; text-align: right; }
  #debug-log {
    position: absolute;
    top: 0; left: 0; right: 0;
    max-height: 40%;
    overflow-y: auto;
    z-index: 30;
    background: rgba(0,0,0,0.8);
    font-family: monospace;
    font-size: 11px;
    line-height: 1.4;
    padding: 4px 8px;
    color: #0f0;
    pointer-events: none;
  }
</style>
</head>
<body>

<div id="header">
  <h1>Beer Pong Detector <small style="opacity:0.4;font-size:11px">v10</small></h1>
  <select id="camera-select"><option value="">Loading cameras…</option></select>
  <span id="stats">--</span>
</div>

<div id="container">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>

  <div id="overlay">
    <div id="overlay-content">
      <div class="spinner"></div>
      <p id="overlay-msg">Starting…</p>
    </div>
  </div>

  <div id="conf-slider">
    <label>Confidence</label>
    <input type="range" id="conf" min="0.1" max="0.95" step="0.05" value="0.45">
    <span id="conf-val">0.45</span>
  </div>
  <div id="debug-log"></div>
</div>

<script>
// ─── Debug logging (visible on screen) ────────────────────────
const debugLog = document.getElementById("debug-log");
const MAX_LOG_LINES = 30;
const logStartTime = Date.now();
function log(msg) {
  const t = ((Date.now() - logStartTime) / 1000).toFixed(1);
  const line = `[${t}s] ${msg}`;
  console.log(line);
  debugLog.textContent += line + "\n";
  // Keep only last N lines
  const lines = debugLog.textContent.split("\n");
  if (lines.length > MAX_LOG_LINES) {
    debugLog.textContent = lines.slice(-MAX_LOG_LINES).join("\n");
  }
  debugLog.scrollTop = debugLog.scrollHeight;
}

// Catch all uncaught errors
window.onerror = (msg, src, line, col, err) => {
  log(`UNCAUGHT ERROR: ${msg} at ${src}:${line}:${col}`);
};
window.onunhandledrejection = (e) => {
  log(`UNHANDLED REJECTION: ${e.reason}`);
};

const CAMERA_ONLY = new URLSearchParams(location.search).has("camera-only");
if (CAMERA_ONLY) log("*** CAMERA-ONLY MODE — no inference ***");

// ─── Config ────────────────────────────────────────────────────
const MODEL_URL = "model/best.onnx";
const CLASSES_URL = "model/classes.json";
const MODEL_INPUT_SIZE = 320;
const IOU_THRESHOLD = 0.5;
let CONF_THRESHOLD = 0.45;
const WORKER_RESET_FRAMES = 100; // terminate & restart worker to free WASM memory

const COLORS = [
  "#e94560","#0f3460","#00b4d8","#e9c46a","#2a9d8f",
  "#e76f51","#6a4c93","#1982c4","#8ac926","#ff595e",
  "#ff924c","#ffca3a","#c77dff","#72efdd","#f72585",
  "#4cc9f0","#7209b7","#3a0ca3","#4361ee","#4895ef",
];

// ─── State ─────────────────────────────────────────────────────
let classNames = {};
let running = false;
let currentStream = null;
let worker = null;
let pendingInference = null; // resolve callback for current inference
let frameCount = 0;

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const overlay = document.getElementById("overlay");
const overlayMsg = document.getElementById("overlay-msg");
const statsEl = document.getElementById("stats");
const confSlider = document.getElementById("conf");
const confVal = document.getElementById("conf-val");
const cameraSelect = document.getElementById("camera-select");

confSlider.addEventListener("input", () => {
  CONF_THRESHOLD = parseFloat(confSlider.value);
  confVal.textContent = CONF_THRESHOLD.toFixed(2);
});

// ─── Camera ────────────────────────────────────────────────────
async function enumerateCameras() {
  const devices = await navigator.mediaDevices.enumerateDevices();
  const videoDevices = devices.filter(d => d.kind === "videoinput");
  cameraSelect.innerHTML = "";
  videoDevices.forEach((d, i) => {
    const opt = document.createElement("option");
    opt.value = d.deviceId;
    opt.textContent = d.label || `Camera ${i + 1}`;
    cameraSelect.appendChild(opt);
  });
  if (!cameraSelect.value && videoDevices.length > 0) {
    cameraSelect.value = videoDevices[0].deviceId;
  }
}

async function startCamera(deviceId) {
  if (currentStream) {
    currentStream.getTracks().forEach(t => t.stop());
  }
  const constraints = {
    video: deviceId
      ? { deviceId: { exact: deviceId }, width: { ideal: 640 }, height: { ideal: 480 } }
      : { facingMode: "environment", width: { ideal: 640 }, height: { ideal: 480 } },
    audio: false,
  };
  currentStream = await navigator.mediaDevices.getUserMedia(constraints);
  video.srcObject = currentStream;
  await video.play();
}

cameraSelect.addEventListener("change", async () => {
  try {
    await startCamera(cameraSelect.value);
  } catch (e) {
    console.error("Camera switch failed:", e);
  }
});

// ─── Inference worker ─────────────────────────────────────────
function createWorker() {
  return new Promise(async (resolve, reject) => {
    log("Fetching model…");
    const modelResp = await fetch(MODEL_URL);
    const modelBuffer = await modelResp.arrayBuffer();
    log(`Model fetched: ${(modelBuffer.byteLength / 1048576).toFixed(1)}MB`);

    const w = new Worker("worker.js");
    w.onmessage = (e) => {
      if (e.data.type === "ready") {
        log("Worker ready");
        worker = w;
        resolve();
      } else if (e.data.type === "result") {
        if (pendingInference) {
          pendingInference({
            data: new Float32Array(e.data.data),
            dims: e.data.dims,
          });
          pendingInference = null;
        }
      } else if (e.data.type === "error") {
        log(`WORKER ERROR: ${e.data.message}`);
        if (pendingInference) {
          pendingInference = null;
        }
      }
    };
    w.onerror = (e) => {
      log(`WORKER ONERROR: ${e.message || e}`);
      reject(e);
    };
    // Transfer model buffer to worker (zero-copy)
    w.postMessage({ type: "init", modelBuffer }, [modelBuffer]);
  });
}

function runInference(float32Data) {
  return new Promise((resolve) => {
    pendingInference = resolve;
    const copy = float32Data.buffer.slice(0);
    worker.postMessage(
      { type: "infer", inputBuffer: copy, dims: [1, 3, MODEL_INPUT_SIZE, MODEL_INPUT_SIZE] },
      [copy]
    );
  });
}

async function resetWorker() {
  log(`Resetting worker at frame ${frameCount}…`);
  if (worker) worker.terminate();
  await createWorker();
  log("Worker reset complete");
}

// ─── Preprocessing ─────────────────────────────────────────────
const offscreen = document.createElement("canvas");
offscreen.width = MODEL_INPUT_SIZE;
offscreen.height = MODEL_INPUT_SIZE;
const octx = offscreen.getContext("2d", { willReadFrequently: true });
const float32Data = new Float32Array(3 * MODEL_INPUT_SIZE * MODEL_INPUT_SIZE);
const pixelCount = MODEL_INPUT_SIZE * MODEL_INPUT_SIZE;

function preprocess(video) {
  octx.drawImage(video, 0, 0, MODEL_INPUT_SIZE, MODEL_INPUT_SIZE);
  const { data } = octx.getImageData(0, 0, MODEL_INPUT_SIZE, MODEL_INPUT_SIZE);

  for (let i = 0; i < pixelCount; i++) {
    float32Data[i]                  = data[i * 4]     / 255.0; // R
    float32Data[pixelCount + i]     = data[i * 4 + 1] / 255.0; // G
    float32Data[2 * pixelCount + i] = data[i * 4 + 2] / 255.0; // B
  }
}

// ─── Post-processing (YOLOv8 output format) ────────────────────
function postprocess(output, videoWidth, videoHeight) {
  const data = output.data;
  const [, channels, numDetections] = output.dims;
  const numClasses = channels - 4;

  const boxes = [];
  for (let i = 0; i < numDetections; i++) {
    let maxScore = 0;
    let classId = 0;
    for (let c = 0; c < numClasses; c++) {
      const score = data[(4 + c) * numDetections + i];
      if (score > maxScore) {
        maxScore = score;
        classId = c;
      }
    }

    if (maxScore < CONF_THRESHOLD) continue;

    const cx = data[0 * numDetections + i];
    const cy = data[1 * numDetections + i];
    const w  = data[2 * numDetections + i];
    const h  = data[3 * numDetections + i];

    const scaleX = videoWidth / MODEL_INPUT_SIZE;
    const scaleY = videoHeight / MODEL_INPUT_SIZE;

    boxes.push({
      x1: (cx - w / 2) * scaleX,
      y1: (cy - h / 2) * scaleY,
      x2: (cx + w / 2) * scaleX,
      y2: (cy + h / 2) * scaleY,
      score: maxScore,
      classId,
    });
  }

  return nms(boxes, IOU_THRESHOLD);
}

function nms(boxes, iouThreshold) {
  boxes.sort((a, b) => b.score - a.score);
  const keep = [];
  const removed = new Set();

  for (let i = 0; i < boxes.length; i++) {
    if (removed.has(i)) continue;
    keep.push(boxes[i]);
    for (let j = i + 1; j < boxes.length; j++) {
      if (removed.has(j)) continue;
      if (boxes[i].classId === boxes[j].classId && iou(boxes[i], boxes[j]) > iouThreshold) {
        removed.add(j);
      }
    }
  }
  return keep;
}

function iou(a, b) {
  const x1 = Math.max(a.x1, b.x1);
  const y1 = Math.max(a.y1, b.y1);
  const x2 = Math.min(a.x2, b.x2);
  const y2 = Math.min(a.y2, b.y2);
  const inter = Math.max(0, x2 - x1) * Math.max(0, y2 - y1);
  const areaA = (a.x2 - a.x1) * (a.y2 - a.y1);
  const areaB = (b.x2 - b.x1) * (b.y2 - b.y1);
  return inter / (areaA + areaB - inter);
}

// ─── Drawing ───────────────────────────────────────────────────
function drawBoxes(detections) {
  const w = canvas.clientWidth, h = canvas.clientHeight;
  if (canvas.width !== w || canvas.height !== h) {
    canvas.width = w;
    canvas.height = h;
  }
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  for (const det of detections) {
    const color = COLORS[det.classId % COLORS.length];
    const label = `${classNames[det.classId] || `class${det.classId}`} ${(det.score * 100).toFixed(0)}%`;

    ctx.strokeStyle = color;
    ctx.lineWidth = 3;
    ctx.strokeRect(det.x1, det.y1, det.x2 - det.x1, det.y2 - det.y1);

    ctx.font = "bold 14px -apple-system, sans-serif";
    const textWidth = ctx.measureText(label).width;
    const labelHeight = 20;
    ctx.fillStyle = color;
    ctx.fillRect(det.x1, det.y1 - labelHeight, textWidth + 8, labelHeight);

    ctx.fillStyle = "#fff";
    ctx.fillText(label, det.x1 + 4, det.y1 - 5);
  }
}

// ─── Detection loop ────────────────────────────────────────────
async function detectLoop() {
  if (!running) return;

  const t0 = performance.now();

  try {
    // Periodically kill and restart the worker — this is the ONLY way to
    // truly free WASM linear memory (it can grow but never shrink).
    if (++frameCount % WORKER_RESET_FRAMES === 0) {
      await resetWorker();
    }

    preprocess(video);
    const output = await runInference(float32Data);
    const detections = postprocess(output, canvas.clientWidth, canvas.clientHeight);

    drawBoxes(detections);

    const dt = performance.now() - t0;
    statsEl.textContent = `${dt.toFixed(0)}ms · ${(1000 / dt).toFixed(1)} FPS · ${detections.length} cup · f${frameCount}`;
    // Log every 10th frame to track progress without spamming
    if (frameCount % 10 === 0) {
      log(`frame ${frameCount} · ${dt.toFixed(0)}ms · ${detections.length} det`);
    }
  } catch (err) {
    log(`DETECT ERROR at frame ${frameCount}: ${err.message || err}`);
    statsEl.textContent = `error: ${err.message}`;
  }

  requestAnimationFrame(detectLoop);
}

// ─── Auto-start ───────────────────────────────────────────────
async function autoStart() {
  try {
    log("autoStart: requesting camera…");
    overlayMsg.textContent = "Starting camera…";
    await startCamera();
    log("autoStart: camera started");
    const activeId = currentStream.getVideoTracks()[0]?.getSettings().deviceId;
    await enumerateCameras();
    if (activeId) cameraSelect.value = activeId;

    overlayMsg.textContent = "Loading model…";
    if (CAMERA_ONLY) {
      overlay.classList.add("hidden");
      running = true;
      log("autoStart: camera-only mode, logging every 5s");
      const camStart = Date.now();
      setInterval(() => {
        const elapsed = ((Date.now() - camStart) / 1000).toFixed(0);
        log(`camera alive at ${elapsed}s`);
      }, 5000);
    } else {
      log("autoStart: loading class names…");
      try {
        const resp = await fetch(CLASSES_URL);
        classNames = await resp.json();
      } catch {
        classNames = { 0: "object" };
      }
      log("autoStart: creating worker…");
      await createWorker();

      overlay.classList.add("hidden");
      running = true;
      log("autoStart: detection loop starting");
      detectLoop();
    }
  } catch (err) {
    log(`AUTOSTART ERROR: ${err.message || err}`);
    overlayMsg.textContent = `Error: ${err.message}`;
    console.error(err);
  }
}
autoStart();
</script>
</body>
</html>
