<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Beer Pong Detector</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    color: #eee;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    overflow: hidden;
    height: 100dvh;
    display: flex;
    flex-direction: column;
  }
  #header {
    padding: 8px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #16213e;
    z-index: 10;
  }
  #header h1 { font-size: 16px; font-weight: 600; }
  #stats { font-size: 13px; opacity: 0.7; }
  #camera-select {
    font-size: 13px;
    background: #0f3460;
    color: #eee;
    border: none;
    padding: 4px 8px;
    border-radius: 4px;
  }
  #container {
    flex: 1;
    position: relative;
    overflow: hidden;
  }
  #video {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: cover;
  }
  #canvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 5;
  }
  #overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 20;
    background: rgba(0,0,0,0.7);
  }
  #overlay.hidden { display: none; }
  #overlay-content { text-align: center; padding: 24px; }
  #overlay-content p { margin: 8px 0; font-size: 14px; }
  .spinner {
    width: 40px; height: 40px;
    border: 4px solid rgba(255,255,255,0.2);
    border-top-color: #e94560;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
#conf-slider {
    position: absolute;
    bottom: 12px; left: 16px; right: 16px;
    z-index: 10;
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(22,33,62,0.85);
    padding: 8px 12px;
    border-radius: 8px;
  }
  #conf-slider label { font-size: 12px; white-space: nowrap; }
  #conf-slider input[type=range] { flex: 1; }
  #conf-val { font-size: 12px; min-width: 36px; text-align: right; }
  #debug-log {
    position: absolute;
    top: 0; left: 0; right: 0;
    max-height: 40%;
    overflow-y: auto;
    z-index: 30;
    background: rgba(0,0,0,0.8);
    font-family: monospace;
    font-size: 11px;
    line-height: 1.4;
    padding: 4px 8px;
    color: #0f0;
    pointer-events: none;
  }
</style>
</head>
<body>

<div id="header">
  <h1>Beer Pong Detector <small style="opacity:0.4;font-size:11px">v16-server</small></h1>
  <select id="camera-select"><option value="">Loading cameras…</option></select>
  <span id="stats">--</span>
</div>

<div id="container">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>

  <div id="overlay">
    <div id="overlay-content">
      <div class="spinner"></div>
      <p id="overlay-msg">Starting…</p>
    </div>
  </div>

  <div id="conf-slider">
    <label>Confidence</label>
    <input type="range" id="conf" min="0.1" max="0.95" step="0.05" value="0.45">
    <span id="conf-val">0.45</span>
  </div>
  <div id="debug-log"></div>
</div>

<script>
// ─── Debug logging (visible on screen) ────────────────────────
const debugLog = document.getElementById("debug-log");
const MAX_LOG_LINES = 30;
const logStartTime = Date.now();
function log(msg) {
  const t = ((Date.now() - logStartTime) / 1000).toFixed(1);
  const line = `[${t}s] ${msg}`;
  console.log(line);
  debugLog.textContent += line + "\n";
  const lines = debugLog.textContent.split("\n");
  if (lines.length > MAX_LOG_LINES) {
    debugLog.textContent = lines.slice(-MAX_LOG_LINES).join("\n");
  }
  debugLog.scrollTop = debugLog.scrollHeight;
}

window.onerror = (msg, src, line, col, err) => {
  log(`UNCAUGHT ERROR: ${msg} at ${src}:${line}:${col}`);
};
window.onunhandledrejection = (e) => {
  log(`UNHANDLED REJECTION: ${e.reason}`);
};

// ─── Config ────────────────────────────────────────────────────
const MODEL_INPUT_SIZE = 320;
let CONF_THRESHOLD = 0.45;

const COLORS = [
  "#e94560","#0f3460","#00b4d8","#e9c46a","#2a9d8f",
  "#e76f51","#6a4c93","#1982c4","#8ac926","#ff595e",
  "#ff924c","#ffca3a","#c77dff","#72efdd","#f72585",
  "#4cc9f0","#7209b7","#3a0ca3","#4361ee","#4895ef",
];

// ─── State ─────────────────────────────────────────────────────
let classNames = {};
let running = false;
let currentStream = null;
let frameCount = 0;
let inferring = false; // prevent overlapping requests

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const overlay = document.getElementById("overlay");
const overlayMsg = document.getElementById("overlay-msg");
const statsEl = document.getElementById("stats");
const confSlider = document.getElementById("conf");
const confVal = document.getElementById("conf-val");
const cameraSelect = document.getElementById("camera-select");

// Offscreen canvas for capturing frames as JPEG (match model input size)
const captureCanvas = document.createElement("canvas");
captureCanvas.width = 320;
captureCanvas.height = 320;
const captureCtx = captureCanvas.getContext("2d");
const TARGET_FPS = 10;
const FRAME_INTERVAL = 1000 / TARGET_FPS;

confSlider.addEventListener("input", () => {
  CONF_THRESHOLD = parseFloat(confSlider.value);
  confVal.textContent = CONF_THRESHOLD.toFixed(2);
});

// ─── Camera ────────────────────────────────────────────────────
async function enumerateCameras() {
  const devices = await navigator.mediaDevices.enumerateDevices();
  const videoDevices = devices.filter(d => d.kind === "videoinput");
  cameraSelect.innerHTML = "";
  videoDevices.forEach((d, i) => {
    const opt = document.createElement("option");
    opt.value = d.deviceId;
    opt.textContent = d.label || `Camera ${i + 1}`;
    cameraSelect.appendChild(opt);
  });
  if (!cameraSelect.value && videoDevices.length > 0) {
    cameraSelect.value = videoDevices[0].deviceId;
  }
}

async function startCamera(deviceId) {
  if (currentStream) {
    currentStream.getTracks().forEach(t => t.stop());
  }
  const constraints = {
    video: deviceId
      ? { deviceId: { exact: deviceId }, width: { ideal: 640 }, height: { ideal: 480 } }
      : { facingMode: "environment", width: { ideal: 640 }, height: { ideal: 480 } },
    audio: false,
  };
  currentStream = await navigator.mediaDevices.getUserMedia(constraints);
  video.srcObject = currentStream;
  await video.play();
}

cameraSelect.addEventListener("change", async () => {
  try {
    await startCamera(cameraSelect.value);
  } catch (e) {
    log("Camera switch failed: " + e.message);
  }
});

// ─── Server-side inference ────────────────────────────────────
function captureFrame() {
  captureCtx.drawImage(video, 0, 0, captureCanvas.width, captureCanvas.height);
  return new Promise((resolve) => {
    captureCanvas.toBlob(resolve, "image/jpeg", 0.5);
  });
}

async function serverInfer(blob) {
  const resp = await fetch(`/infer?conf=${CONF_THRESHOLD}`, {
    method: "POST",
    body: blob,
  });
  return resp.json();
}

// ─── Drawing ───────────────────────────────────────────────────
function drawBoxes(detections) {
  const w = canvas.clientWidth, h = canvas.clientHeight;
  if (canvas.width !== w || canvas.height !== h) {
    canvas.width = w;
    canvas.height = h;
  }
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Scale from model coords (0-320) to display coords
  const scaleX = w / MODEL_INPUT_SIZE;
  const scaleY = h / MODEL_INPUT_SIZE;

  for (const det of detections) {
    const x1 = det.x1 * scaleX;
    const y1 = det.y1 * scaleY;
    const x2 = det.x2 * scaleX;
    const y2 = det.y2 * scaleY;

    const color = COLORS[det.classId % COLORS.length];
    const label = `${classNames[det.classId] || `class${det.classId}`} ${(det.score * 100).toFixed(0)}%`;

    ctx.strokeStyle = color;
    ctx.lineWidth = 3;
    ctx.strokeRect(x1, y1, x2 - x1, y2 - y1);

    ctx.font = "bold 14px -apple-system, sans-serif";
    const textWidth = ctx.measureText(label).width;
    const labelHeight = 20;
    ctx.fillStyle = color;
    ctx.fillRect(x1, y1 - labelHeight, textWidth + 8, labelHeight);

    ctx.fillStyle = "#fff";
    ctx.fillText(label, x1 + 4, y1 - 5);
  }
}

// ─── Detection loop (throttled to TARGET_FPS) ─────────────────
let lastFrameTime = 0;
async function detectLoop() {
  if (!running) return;

  const now = performance.now();
  if (now - lastFrameTime < FRAME_INTERVAL || inferring) {
    requestAnimationFrame(detectLoop);
    return;
  }
  lastFrameTime = now;

  const t0 = now;

  try {
    inferring = true;
    frameCount++;

    const blob = await captureFrame();
    const result = await serverInfer(blob);
    const detections = result.detections || [];

    drawBoxes(detections);

    const dt = performance.now() - t0;
    const serverMs = result.inferenceMs || 0;
    statsEl.textContent = `${dt.toFixed(0)}ms total · ${serverMs}ms server · ${detections.length} det · f${frameCount}`;

    if (frameCount % 10 === 0) {
      log(`f${frameCount} · ${dt.toFixed(0)}ms total · ${serverMs}ms server · ${detections.length} det`);
    }
  } catch (err) {
    log(`DETECT ERROR f${frameCount}: ${err.message || err}`);
    statsEl.textContent = `error: ${err.message}`;
  } finally {
    inferring = false;
  }

  requestAnimationFrame(detectLoop);
}

// ─── Auto-start ───────────────────────────────────────────────
async function autoStart() {
  try {
    log("autoStart: requesting camera…");
    overlayMsg.textContent = "Starting camera…";
    await startCamera();
    log("autoStart: camera started");
    const activeId = currentStream.getVideoTracks()[0]?.getSettings().deviceId;
    await enumerateCameras();
    if (activeId) cameraSelect.value = activeId;

    overlayMsg.textContent = "Loading classes…";
    try {
      const resp = await fetch("model/classes.json");
      classNames = await resp.json();
      log(`Classes loaded: ${JSON.stringify(classNames)}`);
    } catch {
      classNames = { 0: "object" };
    }

    overlay.classList.add("hidden");
    running = true;
    log("autoStart: server-side detection loop starting");
    detectLoop();
  } catch (err) {
    log(`AUTOSTART ERROR: ${err.message || err}`);
    overlayMsg.textContent = `Error: ${err.message}`;
    console.error(err);
  }
}
autoStart();
</script>
</body>
</html>
